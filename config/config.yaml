  client_resource: locust  # 长连接登录 resource / client 标识
  debug: false  # 是否开启调试日志（依脚本实现）
  console_log: true  # 是否在控制台输出连接等业务日志

  message: hello  # 单聊等场景默认消息正文（聊天室场景可单独覆盖）
  singlechat_message_interval_s: 1.0  # 单聊发消息间隔（秒）；并发用户数用 locust -u，时长用 locust -t
  singlechat_offline_at_s: 200  # 首批下线触发时刻（自启动起的秒）
  singlechat_offline_count: 10  # 首批下线用户数
  singlechat_online1_at_s: 240  # 第一次重回上线触发时刻（秒）
  singlechat_online1_count: 7  # 第一次重回上线用户数
  singlechat_online2_at_s: 300  # 第二次重回上线触发时刻（秒）
  singlechat_online2_count: 3  # 第二次重回上线用户数

  speech_username: tst  # 语音 HTTP 压测用户名
  speech_file_id: 125f9450-3ee6-11f1-b71d-09f78932ed3c  # 语音文件 ID
  speech_target_qps:  # 语音接口目标 QPS，空表示不限速/未启用

  qa:
    mode: tcp  # 长连接传输：tcp | websocket
    host: msync-im-qa-hsb.easemob.com  # MSync 接入域名或 IP
    port: 6717  # MSync 端口
    path: /websocket  # websocket 模式下的路径；tcp 时部分脚本可忽略
    use_ssl: false  # 是否 TLS（false 为明文）

  hsb:
    mode: tcp  # 长连接传输：tcp | websocket
    host: msync-im-hsb.easemob.com  # MSync 接入域名或 IP
    port: 6717  # MSync 端口
    path: /im  # websocket 模式下的路径
    use_ssl: false  # 是否 TLS

  ebs:
    mode: tcp  # 长连接传输：tcp | websocket
    host: msync-im.easemob.com  # MSync 接入域名或 IP
    port: 6717  # MSync 端口
    path: /im  # websocket 模式下的路径
    use_ssl: false  # 是否 TLS

  tke:
    mode: tcp  # 长连接传输：tcp | websocket
    host: tke-sdb-msync-im1.easemob.com  # MSync 接入域名或 IP
    port: 6717  # MSync 端口
    path: /im  # websocket 模式下的路径
    use_ssl: false  # 是否 TLS
