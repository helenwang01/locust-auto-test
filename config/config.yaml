active_env: qa  # 当前激活环境名，对应下方 rest.<name> 与 locust.<name> 块

headers:
  accept: application/json  # 通用 Accept 请求头
  content_type: application/json  # 通用 Content-Type（多为 JSON）

data_seed:
  user_prefix: yc  # 用户名前缀，造号与压测身份生成
  user_password: "1"  # 用户登录密码
  user_pad: 0  # 用户编号补零位数，0 表示不补零
  user_timeout_s: 15  # REST 调用超时（秒）
  create_users_start: 1  # 批量创建用户起始编号（含）
  create_users_end: 6000  # 批量创建用户结束编号（含）
  create_users_batch: 50  # 每批创建用户数（通常 1..50）
  friends_count: 210  # 导入好友数量
  friends_owner: yc1  # 好友导入时的 owner 用户名
  metadata_org: easemob-demo  # metadata 接口请求头：组织
  metadata_app: wang01  # metadata 接口请求头：应用
  metadata_role: admin-user  # metadata 接口请求头：角色
  room_id: room_1  # 聊天室 ID 种子（生成 room_1..room_N 等）

rest:
  qa:
    rest_url: http://a1-qa-hsb.easemob.com  # QA REST 网关地址
    org_name: easemob-demo  # 租户组织名
    app_name: wang01  # 应用名
    users_path: /users  # 用户相关 REST 路径前缀
    app_key: easemob-demo#wang01  # 应用密钥（token 等）
  hsb:
    rest_url: http://a1-hsb.easemob.com  # HSB REST 网关地址
    org_name: easemob-demo  # 租户组织名
    app_name: wang01  # 应用名
    users_path: /users  # 用户相关 REST 路径前缀
    app_key: easemob-demo#wang01  # 应用密钥
  ebs:
    rest_url: http://a1.easemob.com  # EBS REST 网关地址
    org_name: easemob-demo  # 租户组织名
    app_name: wang  # 应用名
    users_path: /users  # 用户相关 REST 路径前缀
    app_key: easemob-demo#wang  # 应用密钥
  tke:
    rest_url: http://tke-sdb-a1.easemob.com  # TKE REST 网关地址
    org_name: 100260423254379  # 租户组织名（数字 org）
    app_name: wang  # 应用名
    users_path: /users  # 用户相关 REST 路径前缀
    app_key: 100260423254379#wang  # 应用密钥

locust:
  scenes:
    - name: jingqi-chatroom  # 场景标识（chatroom_scene / 分层模型用）
      room_count: 20  # 直播间（聊天室）数量
      room_tiers:
        hot:
          room_ratio: 0.2  # 热门档房间占全部房间的比例
          user_target_min: 80000  # 热门档单房在线下限（目标区间）
          user_target_max: 100000  # 热门档单房在线上限（目标区间）
        mid:
          room_ratio: 0.5  # 中腰部房间占全部房间的比例
          user_target: 50000  # 中腰部单房在线目标人数
        tail:
          room_ratio: 0.3  # 长尾房间占全部房间的比例
          user_target: 20000  # 长尾单房在线目标人数
      surge_window_s: 300  # 瞬时涌入窗口时长（秒）
      surge_curve: s_curve  # 涌入曲线：linear | s_curve | front_loaded
      peak_target_users: 1200000  # 峰值在线总目标（全房间汇总）

    - name: chatroom-online-small  # 默认聊天室摸高压测场景（可被 LOCUST_CHATROOM_SCENE 覆盖）
      room_count: 10  # 聊天室数量默认值（可被 --room-count 覆盖）
      users_per_room: 50  # 每房在线人数默认值（可被 --users-per-room 覆盖）
      sender_per_room: 1  # 每房发送者人数默认值（可被 --sender-per-room 覆盖）
      room_msg_rps: 10  # 每房发送速率默认值（条/秒，可被 --room-msg-rps 覆盖）
#      send_batch_duration_s: 1  # 每批连续发送时长（秒）
#      send_pause_interval_s: 60  # 每批发送后静默时长（秒）
      message: hello
